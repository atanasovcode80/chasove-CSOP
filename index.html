        // --- ЛОГИКА ЗА ИНДИВИДУАЛНИТЕ ГРАФИЦИ НА ПЕРСОНАЛА ---
        function getTeacherSchedule(teacherId) {
            let tSched = { "понеделник": {}, "вторник": {}, "сряда": {}, "четвъртък": {}, "петък": {} };
            
            // 1. Стандартни часове от разписанието
            Object.keys(FULL_SCHEDULE).forEach(paralelkaName => {
                let pData = FULL_SCHEDULE[paralelkaName];
                Object.keys(pData).forEach(day => {
                    Object.keys(pData[day]).forEach(hour => {
                        if (pData[day][hour].teacher === teacherId && teacherId !== "") {
                            let subject = pData[day][hour].subject;
                            let isWith = paralelkaName;
                            tSched[day][hour] = { subject, isWith, teacher: teacherId };
                        }
                    });
                });
            });

            // 2. Следобедни блокове за Възпитатели
            const educatorGroups = {
                "Възп1": "сборна - 1 общ.",
                "Възп2": "сборна - 2 общ.",
                "Възп3": "сборна - 3 общ.",
                "Възп4": "сборна - 4 общ.",
                "Възп5": "сборна - 5 общ.",
                "Възп6": "сборна - 6 общ."
            };

            if (educatorGroups[teacherId]) {
                const groupName = educatorGroups[teacherId];
                const days = ["понеделник", "вторник", "сряда", "четвъртък", "петък"];
                days.forEach(day => {
                    tSched[day]["e1"] = { subject: "Организиран отдих и физическа активност", isWith: groupName, teacher: teacherId };
                    tSched[day]["e2"] = { subject: "Занимания по интереси", isWith: groupName, teacher: teacherId };
                    tSched[day]["e3"] = { subject: "Самоподготовка", isWith: groupName, teacher: teacherId };
                    tSched[day]["e4"] = { subject: "Занимания по интереси", isWith: groupName, teacher: teacherId };
                    tSched[day]["e5"] = { subject: "Самоподготовка", isWith: groupName, teacher: teacherId };
                    tSched[day]["e6"] = { subject: "Самоподготовка", isWith: groupName, teacher: teacherId };
                    tSched[day]["e7"] = { subject: "Занимания по интереси", isWith: groupName, teacher: teacherId };
                    tSched[day]["e8"] = { subject: "Занимания по интереси", isWith: groupName, teacher: teacherId };
                });
            }

            // 3. Индивидуални графици от THERAPISTS_EXTRA_SCHEDULE (за ПСР, ЕРГО, РКН, 10, РП)
            if (THERAPISTS_EXTRA_SCHEDULE[teacherId]) {
                Object.keys(THERAPISTS_EXTRA_SCHEDULE[teacherId]).forEach(day => {
                    THERAPISTS_EXTRA_SCHEDULE[teacherId][day].forEach(slot => {
                        const sTime = parseTime(slot.start);
                        const eTime = parseTime(slot.end);
                        
                        // Намираме правилния ID на слота за това време
                        const activeSlotsForTeacher = getActiveSlots(teacherId);
                        const matchedSlot = activeSlotsForTeacher.find(s => s.start === sTime && s.end === eTime);
                        
                        if (matchedSlot) {
                            tSched[day][matchedSlot.id] = {
                                subject: slot.subject,
                                isWith: slot.group,
                                teacher: teacherId
                            };
                        }
                    });
                });
            }

            return tSched;
        }

        // --- ЛОГИКА ЗА ВРЕМЕТО И ЗВЪНЕЦА ---

        const parseTime = (timeStr) => {
            const [h, m] = timeStr.split(':').map(Number);
            return h * 60 + m;
        };

        const formatTimeDisplay = (mins) => {
            const h = Math.floor(mins / 60).toString().padStart(2, '0');
            const m = (mins % 60).toString().padStart(2, '0');
            return `${h}:${m}`;
        };

        // Динамични слотове според профила на потребителя
        const getActiveSlots = (teacherId) => {
            const baseSlots = [
                { id: "1", start: parseTime('08:00'), end: parseTime('08:35') },
                { id: "2", start: parseTime('08:45'), end: parseTime('09:20') },
                { id: "3", start: parseTime('09:30'), end: parseTime('10:05') },
                { id: "4", start: parseTime('10:35'), end: parseTime('11:10') },
                { id: "5", start: parseTime('11:20'), end: parseTime('11:55') },
                { id: "6", start: parseTime('12:05'), end: parseTime('12:40') },
                { id: "7", start: parseTime('12:50'), end: parseTime('13:25') }
            ];
            
            if (String(teacherId).startsWith("Възп")) {
                return [
                    { id: "e1", start: parseTime('12:30'), end: parseTime('14:30') },
                    { id: "e2", start: parseTime('14:30'), end: parseTime('15:00') },
                    { id: "e3", start: parseTime('15:00'), end: parseTime('15:35') },
                    { id: "e4", start: parseTime('15:35'), end: parseTime('16:00') },
                    { id: "e5", start: parseTime('16:00'), end: parseTime('16:35') },
                    { id: "e6", start: parseTime('16:40'), end: parseTime('17:15') },
                    { id: "e7", start: parseTime('17:15'), end: parseTime('17:35') },
                    { id: "e8", start: parseTime('17:35'), end: parseTime('18:00') }
                ];
            }

            let allSlots = [...baseSlots];

            // Ако учителят има специални извънредни слотове (терапевти)
            if (THERAPISTS_EXTRA_SCHEDULE[teacherId]) {
                const extraSlotsMap = new Map();
                Object.values(THERAPISTS_EXTRA_SCHEDULE[teacherId]).forEach(dayArr => {
                    dayArr.forEach(slot => {
                        const sTime = parseTime(slot.start);
                        const eTime = parseTime(slot.end);
                        const slotId = `extra_${sTime}_${eTime}`;
                        if (!extraSlotsMap.has(slotId)) {
                            extraSlotsMap.set(slotId, { id: slotId, start: sTime, end: eTime });
                        }
                    });
                });
                
                allSlots = [...allSlots, ...Array.from(extraSlotsMap.values())];
            }

            // Премахване на абсолютни дубликати (с едно и също начало и край)
            const uniqueSlots = [];
            allSlots.forEach(s => {
                if (!uniqueSlots.find(u => u.start === s.start && u.end === s.end)) {
                    uniqueSlots.push(s);
                }
            });

            return uniqueSlots.sort((a, b) => a.start - b.start);
        };

        // --- ФОРМАТИРАНЕ ---

        const formatTeacherName = (name) => {
            if (!name) return "";
            const firstName = name.split(' ')[0];
            if (firstName.endsWith('а') || firstName.endsWith('я')) {
                return 'г-жа ' + name;
            } else {
                return 'г-н ' + name;
            }
        };

        const getSlotLabel = (slotId) => {
            const ordinals = { 1: "1-ви час", 2: "2-ри час", 3: "3-ти час", 4: "4-ти час", 5: "5-ти час", 6: "6-ти час", 7: "7-ми час" };
            if (ordinals[slotId]) return ordinals[slotId];
            if (String(slotId).startsWith('e')) return "Следобед";
            if (String(slotId).startsWith('extra_')) return "Група"; // За терапевтите
            return "Час";
        };

        const getStatus = (todaySchedule, currentMins, userSlots) => {
            if (!todaySchedule || Object.keys(todaySchedule).length === 0) return { type: 'no_data' };

            // Филтрираме само слотовете, в които реално има назначен час за деня
            const activeUserSlots = userSlots.filter(s => todaySchedule[s.id]);
            
            if (activeUserSlots.length === 0) return { type: 'no_data' };

            // Сортираме по време за всеки случай
            activeUserSlots.sort((a, b) => a.start - b.start);

            let currentSlot = activeUserSlots.find(s => currentMins >= s.start && currentMins < s.end);
            
            const findNextClass = (mins) => {
                let nextS = activeUserSlots.find(s => s.start > mins);
                if (nextS) return { slot: nextS, data: todaySchedule[nextS.id] };
                return null;
            };

            if (currentSlot) {
                return { type: 'in_class', slot: currentSlot, data: todaySchedule[currentSlot.id], startedAgo: currentMins - currentSlot.start };
            }

            if (currentMins < activeUserSlots[0].start) {
                let next = findNextClass(currentMins);
                return { type: 'before_school', nextClass: next };
            }

            if (currentMins >= activeUserSlots[activeUserSlots.length - 1].end) {
                return { type: 'after_school' };
            }

            let next = findNextClass(currentMins);
            if (next) {
                return { type: 'break', nextClass: next, startsIn: next.slot.start - currentMins };
            }

            return { type: 'after_school' };
        };

        // --- ЕКСПОРТ И ЛОГИКА ЗА ТАБЛИЦАТА ---

                    try {
                        const res = await fetch('https://worldtimeapi.org/api/timezone/Europe/Sofia', { cache: 'no-store' });
                        if (!res.ok) throw new Error('API 1 Network error');
                        const data = await res.json();
                        const internetTime = new Date(data.datetime).getTime();
                        setTimeOffset(internetTime - Date.now());
                        setTimeSyncStatus('synced');
                    } catch (err1) {
                        try {
                            const res2 = await fetch('https://timeapi.io/api/Time/current/zone?timeZone=UTC', { cache: 'no-store' });
                            if (!res2.ok) throw new Error('API 2 Network error');
                            const data2 = await res2.json();
                            const internetTime = new Date(data2.dateTime + "Z").getTime();
                            setTimeOffset(internetTime - Date.now());
                            setTimeSyncStatus('synced');
                        } catch (err2) {
                            setTimeSyncStatus('failed');
                        }
                    }
                };
                fetchTime();

                        weekday: 'short',
                        hour: 'numeric',
                        minute: 'numeric',
                        hourCycle: 'h23'
                    });
                    const parts = formatter.formatToParts(currentTime);
                    let h = 0, m = 0, wdStr = 'Mon';
                    parts.forEach(p => {
                        if (p.type === 'hour') h = parseInt(p.value, 10);
                        if (p.type === 'minute') m = parseInt(p.value, 10);
                        if (p.type === 'weekday') wdStr = p.value;
                    });
                    const dayMap = { "Sun": 0, "Mon": 1, "Tue": 2, "Wed": 3, "Thu": 4, "Fri": 5, "Sat": 6 };
                    dayOfWeek = dayMap[wdStr];
                    currentMins = h * 60 + m;
                } catch (e) {
                    dayOfWeek = currentTime.getDay();
                    currentMins = currentTime.getHours() * 60 + currentTime.getMinutes();
                }
            }

            const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
            const daysArr = ["понеделник", "вторник", "сряда", "четвъртък", "петък"];
            const todayStr = isWeekend ? "понеделник" : daysArr[dayOfWeek - 1]; 

            let fullWeekSchedule = {};
            if (selectedId) {
                if (userType === 'student') {
                    fullWeekSchedule = FULL_SCHEDULE[selectedId] || {};
                } else {
                    fullWeekSchedule = getTeacherSchedule(selectedId);
                }
            }
            
            const currentSchedule = fullWeekSchedule[todayStr] || {};
            const userSlots = selectedId ? getActiveSlots(selectedId) : getActiveSlots("");
            const status = isWeekend && !testTimeMode ? { type: 'weekend' } : getStatus(currentSchedule, currentMins, userSlots);

            const renderHome = () => (
                <div className="flex flex-col items-center justify-center min-h-[80vh] px-4 fade-in mt-10 w-full max-w-4xl mx-auto">
                    <h1 className="text-3xl md:text-5xl font-extrabold text-slate-800 text-center mb-4 tracking-tight">Провери какви часове имаш</h1>
                    <p className="text-slate-500 mb-10 text-lg md:text-xl text-center font-medium">Избери своя профил, за да видиш дневното си разписание.</p>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 w-full">
                        <button 
                            onClick={() => setView('select_student')}
                            className="flex flex-col items-center justify-center p-8 bg-white rounded-[2rem] shadow-md border-4 border-transparent hover:border-blue-200 hover:shadow-xl hover:-translate-y-1 transition-all group md:h-64"
                        >
                            <Icons.Student />
                            <span className="text-3xl md:text-4xl font-extrabold text-slate-700 group-hover:text-blue-600 transition-colors">Ученици</span>
                        </button>

                        <button 
                            onClick={() => setView('select_teacher')}
                            className="flex flex-col items-center justify-center p-8 bg-white rounded-[2rem] shadow-md border-4 border-transparent hover:border-emerald-200 hover:shadow-xl hover:-translate-y-1 transition-all group md:h-64"
                        >
                            <Icons.Teacher />
                            <span className="text-3xl md:text-4xl font-extrabold text-slate-700 group-hover:text-emerald-600 transition-colors">Персонал</span>
                        </button>
                    </div>

                    {/* СЕКЦИЯ АДМИНИСТРАЦИЯ ЗА ЕКСПОРТ */}
                    <div className="mt-16 flex flex-col items-center w-full border-t-2 border-slate-200/60 pt-8">
                        <p className="text-slate-400 mb-6 font-bold uppercase tracking-widest text-sm">Администрация: Пълно разписание</p>
                        <div className="flex flex-col sm:flex-row gap-4 w-full sm:w-auto">
                            <button onClick={handleExportWord} className="flex items-center justify-center px-8 py-4 bg-[#2b579a] hover:bg-[#1e3f6f] text-white rounded-2xl font-bold shadow-md transition-all transform hover:-translate-y-1 w-full sm:w-auto">
                                <Icons.Word />
                                Експорт в Word
                            </button>
                            <button onClick={handleExportExcel} className="flex items-center justify-center px-8 py-4 bg-[#217346] hover:bg-[#175231] text-white rounded-2xl font-bold shadow-md transition-all transform hover:-translate-y-1 w-full sm:w-auto">
                                <Icons.Excel />
                                Експорт в Excel
                            </button>
                        </div>
                    </div>
                </div>
            );

            const renderSelector = (type) => {
                const isStudent = type === 'select_student';
                const options = isStudent 
                    ? PARALELKI.map(p => ({ value: p, label: p }))
                    : Object.keys(TEACHERS).filter(k => k !== "").map(k => ({ value: k, label: TEACHERS[k] }));

                return (
                    <div className="flex flex-col items-center pt-20 px-4 fade-in w-full max-w-2xl mx-auto">
                        <button onClick={goHome} className="self-start flex items-center text-slate-500 hover:text-slate-800 mb-8 text-lg font-bold transition-colors">
                            <Icons.Back /> Назад към началото
                        </button>
                        
                        <div className="bg-white p-8 md:p-10 rounded-[2rem] shadow-xl border border-slate-100 w-full">
                            <h2 className="text-3xl md:text-4xl font-extrabold text-slate-800 mb-8 text-center">
                                {isStudent ? "Аз съм ученик от..." : "Аз съм..."}
                            </h2>
                            
                            <select 
                                className="w-full text-xl md:text-2xl p-4 md:p-6 bg-slate-50 border-4 border-slate-200 rounded-xl mb-8 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition-all font-bold text-slate-700 cursor-pointer shadow-inner"
                                value={selectedId}
                                onChange={(e) => setSelectedId(e.target.value)}
                            >
                                <option value="" disabled>-- Избери от списъка --</option>
                                {options.map(opt => (
                                    <option key={opt.value} value={opt.value}>{opt.label}</option>
                                ))}
                            </select>

                            <button 
                                disabled={!selectedId}
                                onClick={() => { setUserType(isStudent ? 'student' : 'teacher'); setView('dashboard'); setScheduleViewMode('daily'); }}
                                className={`w-full p-4 md:p-6 rounded-xl text-2xl font-black transition-all shadow-md flex items-center justify-center ${selectedId ? 'bg-blue-600 text-white hover:bg-blue-700 hover:shadow-xl transform hover:-translate-y-1' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}
                            >
                                Продължи
                            </button>
                        </div>
                    </div>
                );
            };

            const renderStatusBox = () => {
                if (status.type === 'weekend') {
                    return <div className="bg-emerald-100 text-emerald-800 p-6 rounded-[1.5rem] shadow-sm text-center text-2xl font-extrabold border-l-8 border-emerald-500 mb-8">Днес е почивен ден! Приятна почивка!</div>;
                }
                if (status.type === 'no_data') {
                    return <div className="bg-slate-200 text-slate-600 p-6 rounded-[1.5rem] shadow-sm text-center text-2xl font-extrabold mb-8">Няма въведени часове за днес.</div>;
                }
                if (status.type === 'after_school') {
                    return <div className="bg-blue-100 text-blue-800 p-6 rounded-[1.5rem] shadow-sm text-center text-2xl font-extrabold border-l-8 border-blue-500 mb-8">Учебните часове за днес приключиха!</div>;
                }
                if (status.type === 'before_school') {
                    return (
                        <div className="bg-blue-50 text-blue-800 p-6 rounded-[1.5rem] shadow-sm border-l-8 border-blue-400 mb-8">
                            <h3 className="text-3xl font-extrabold mb-3">Добро утро!</h3>
                            {status.nextClass ? (
                                <p className="text-xl font-medium">Първият ти час е <span className="font-black bg-white px-2 py-1 rounded-md shadow-sm mx-1 text-blue-900">{status.nextClass.data.subject}</span> и започва в <span className="font-black text-blue-900">{formatTimeDisplay(status.nextClass.slot.start)}</span>.</p>
                            ) : null}
                        </div>
                    );
                }
                if (status.type === 'in_class') {
                    let teacherText = "";
                    let teacherId = null;
                    if (status.data.teacher) {
                        teacherText = userType === 'student' ? `при ${formatTeacherName(TEACHERS[status.data.teacher])}` : `с ${status.data.isWith}`;
                        teacherId = userType === 'student' ? status.data.teacher : null;
                    }

                    return (
                        <div className="bg-orange-50 border-l-8 border-orange-500 p-6 md:p-8 rounded-[1.5rem] shadow-md mb-8 relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-4 opacity-10 scale-150 transform translate-x-1/4 -translate-y-1/4">
                                <Icons.Clock />
                            </div>
                            
                            <div className="z-10 relative flex flex-col md:flex-row md:items-center">
                                <div className="flex-1">
                                    <h3 className="text-2xl md:text-3xl font-extrabold text-orange-900 mb-2 leading-tight">
                                        В момента {userType === 'student' ? 'имаш' : 'имате'}
                                    </h3>
                                    <div className="text-3xl md:text-4xl font-black text-orange-600 underline decoration-4 underline-offset-4 mb-4 md:mb-0">
                                        {status.data.subject}
                                    </div>
                                </div>
                                
                                {teacherText && (
                                    <div className="flex items-center bg-white/80 p-3 md:p-4 rounded-2xl shadow-sm border border-orange-100 mt-4 md:mt-0 w-max">
                                        {userType === 'student' && teacherId && (
                                            <TeacherAvatar teacherId={teacherId} sizeClass="w-16 h-16 md:w-24 md:h-24 mr-4" />
                                        )}
                                        <span className="text-xl md:text-3xl font-extrabold text-orange-800">{teacherText}</span>
                                    </div>
                                )}
                            </div>

                            {status.startedAgo > 0 && (
                                <p className="text-orange-900 text-xl font-black bg-orange-200 inline-block px-4 py-2 rounded-lg mt-4 shadow-sm border border-orange-300 z-10 relative">
                                    Побързай, часът е започнал преди {status.startedAgo} минути!
                                </p>
                            )}
                        </div>
                    );
                }
                if (status.type === 'break') {
                    let teacherText = "";
                    let teacherId = null;
                    if (status.nextClass.data.teacher) {
                        teacherText = userType === 'student' ? `при ${formatTeacherName(TEACHERS[status.nextClass.data.teacher])}` : `с ${status.nextClass.data.isWith}`;
                        teacherId = userType === 'student' ? status.nextClass.data.teacher : null;
                    }

                    return (
                        <div className="bg-emerald-50 border-l-8 border-emerald-500 p-6 md:p-8 rounded-[1.5rem] shadow-md mb-8 relative overflow-hidden">
                            <h3 className="text-3xl font-extrabold text-emerald-900 mb-4">Междучасие!</h3>
                            
                            <div className="mb-4 flex flex-col items-start">
                                <div className="text-emerald-800 text-xl font-medium leading-tight mb-2">
                                    Следващият <span className="font-black text-2xl text-emerald-900">{getSlotLabel(status.nextClass.slot.id)}</span> {userType === 'student' ? 'имаш' : 'имате'}
                                </div>
                                <div className="font-black text-3xl underline decoration-4 underline-offset-4 text-emerald-900 mb-4">
                                    {status.nextClass.data.subject}
                                </div>
                                
                                {teacherText && (
                                    <div className="flex items-center bg-white/80 p-3 md:p-4 rounded-2xl shadow-sm border border-emerald-100 w-max">
                                        {userType === 'student' && teacherId && (
                                            <TeacherAvatar teacherId={teacherId} sizeClass="w-16 h-16 md:w-24 md:h-24 mr-4" />
                                        )}
                                        <span className="text-xl md:text-3xl font-extrabold text-emerald-800">{teacherText}</span>
                                    </div>
                                )}
                            </div>
                            
                            <p className="text-emerald-900 text-xl font-black bg-emerald-200 inline-flex items-center px-4 py-2 rounded-lg shadow-sm border border-emerald-300">
                                <Icons.Clock /> Започва след {status.startsIn} минути
                            </p>
                        </div>
                    );
                }
                if (status.type === 'free_period') {
                    return (
                        <div className="bg-sky-50 border-l-8 border-sky-400 p-6 md:p-8 rounded-[1.5rem] shadow-md mb-8">
                            <h3 className="text-3xl font-extrabold text-sky-900 mb-4">В момента {userType === 'student' ? 'имаш' : 'имате'} свободен час!</h3>
                            {status.nextClass ? (
                                <p className="text-sky-800 text-xl font-medium">Следващият <span className="font-bold">{getSlotLabel(status.nextClass.slot.id)}</span> е <span className="font-black bg-white px-2 py-1 rounded shadow-sm text-sky-900">{status.nextClass.data.subject}</span> и започва след <span className="font-black text-sky-900">{status.nextClass.slot.start - currentMins} минути</span>.</p>
                            ) : (
                                <p className="text-sky-800 text-xl font-medium">Нямате повече часове за днес.</p>
                            )}
                        </div>
                    );
                }
                return null;
            };

            const renderWeeklyView = () => {
                return (
                    <div className="mt-4 flex-1 animate-[fadeIn_0.3s_ease-out] w-full">
                        
                        {/* ДЕСКТОП ИЗГЛЕД НА СЕДМИЦАТА (Таблица) */}
                        <div className="hidden lg:block overflow-x-auto pb-6">
                            <table className="w-full text-left border-separate border-spacing-y-3 border-spacing-x-2">
                                <thead>
                                    <tr>
                                        <th className="p-3 font-bold text-slate-400 uppercase tracking-widest w-28 text-center">Час</th>
                                        {daysArr.map(day => (
                                            <th key={day} className={`p-4 font-black text-xl capitalize text-center rounded-2xl transition-colors ${day === todayStr && !isWeekend ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-slate-700 shadow-sm border border-slate-100'}`}>
                                                {day}
                                                {day === todayStr && !isWeekend && <div className="text-xs font-bold text-blue-200 uppercase mt-1">Днес</div>}
                                            </th>
                                        ))}
                                    </tr>
                                </thead>
                                <tbody>
                                    {userSlots.map(slot => {
                                        const hasClassAnyDay = daysArr.some(day => fullWeekSchedule[day]?.[slot.id]);
                                        if (!hasClassAnyDay) return null;

                                        return (
                                            <tr key={slot.id}>
                                                <td className="p-3 align-middle text-center bg-white rounded-2xl shadow-sm border border-slate-100">
                                                    <div className="font-black text-lg text-slate-700">{getSlotLabel(slot.id)}</div>
                                                    <div className="text-[11px] font-bold text-slate-400 mt-1 whitespace-nowrap">{formatTimeDisplay(slot.start)}</div>
                                                    <div className="text-[11px] font-bold text-slate-400 whitespace-nowrap">{formatTimeDisplay(slot.end)}</div>
                                                </td>
                                                {daysArr.map(day => {
                                                    const classData = fullWeekSchedule[day]?.[slot.id];
                                                    const isToday = day === todayStr && !isWeekend;
                                                    const isPast = isToday && currentMins > slot.end;
                                                    const isCurrent = isToday && currentMins >= slot.start && currentMins <= slot.end;

                                                    let teacherText = "";
                                                    if (classData && classData.teacher) {
                                                        teacherText = userType === 'student' ? formatTeacherName(TEACHERS[classData.teacher]) : classData.isWith;
                                                    }

                                                    return (
                                                        <td key={day} className={`p-4 align-top rounded-2xl transition-all border ${
                                                            !classData ? 'bg-transparent border-transparent' : 
                                                            isCurrent ? 'bg-blue-50 shadow-md border-blue-200 ring-2 ring-blue-400 transform scale-[1.02] z-10' : 
                                                            isPast ? 'bg-slate-100 border-slate-200 opacity-60 grayscale' : 
                                                            'bg-white shadow-sm border-slate-100 hover:shadow-md'
                                                        }`}>
                                                            {classData ? (
                                                                <div className="flex flex-col h-full min-h-[5rem]">
                                                                    <div className={`font-black text-lg leading-tight mb-3 ${isCurrent ? 'text-blue-900' : 'text-slate-800'}`}>
                                                                        {classData.subject}
                                                                    </div>
                                                                    {teacherText && (
                                                                        <div className="mt-auto flex items-center pt-2">
                                                                            {userType === 'student' && classData.teacher ? (
                                                                                <TeacherAvatar teacherId={classData.teacher} sizeClass="w-8 h-8 mr-2 border-2" />
                                                                            ) : (
                                                                                <Icons.User />
                                                                            )}
                                                                            <span className={`text-xs font-bold leading-tight ${isCurrent ? 'text-blue-700' : 'text-slate-500'}`}>
                                                                                {teacherText}
                                                                            </span>
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            ) : (
                                                                <div className="flex items-center justify-center h-full opacity-30">
                                                                    <span className="w-2 h-2 rounded-full bg-slate-300"></span>
                                                                </div>
                                                            )}
                                                        </td>
                                                    );
                                                })}
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>

                        {/* МОБИЛЕН ИЗГЛЕД НА СЕДМИЦАТА (Списък) */}
                        <div className="lg:hidden space-y-8 pb-8">
                            {daysArr.map(day => {
                                const daySlots = userSlots.filter(s => fullWeekSchedule[day]?.[s.id]);
                                if(daySlots.length === 0) return null;
                                
                                const isToday = day === todayStr && !isWeekend;

                                return (
                                    <div key={day} className={`p-5 rounded-[2rem] shadow-sm border ${isToday ? 'bg-blue-50/50 border-blue-200' : 'bg-white border-slate-100'}`}>
                                        <div className="flex items-center justify-between border-b-2 border-slate-100/80 pb-3 mb-4">
                                            <h3 className={`text-2xl font-black capitalize ${isToday ? 'text-blue-700' : 'text-slate-700'}`}>
                                                {day}
                                            </h3>
                                            {isToday && <span className="bg-blue-600 text-white text-xs font-bold px-3 py-1 rounded-lg uppercase tracking-wider shadow-sm">Днес</span>}
                                        </div>
                                        <div className="space-y-3">
                                            {daySlots.map(slot => {
                                                const classData = fullWeekSchedule[day][slot.id];
                                                const isPast = isToday && currentMins > slot.end;
                                                const isCurrent = isToday && currentMins >= slot.start && currentMins <= slot.end;

                                                let teacherText = "";
                                                if (classData.teacher) {
                                                    teacherText = userType === 'student' ? formatTeacherName(TEACHERS[classData.teacher]) : classData.isWith;
                                                }

                                                return (
                                                    <div key={slot.id} className={`flex items-center p-3 rounded-2xl ${isPast ? 'opacity-60 bg-slate-100 grayscale' : isCurrent ? 'bg-white shadow-md ring-2 ring-blue-400' : 'bg-slate-50'}`}>
                                                        <div className="w-16 text-center shrink-0 border-r-2 border-slate-200 pr-2 mr-3">
                                                            <div className={`text-sm font-black ${isCurrent ? 'text-blue-600' : 'text-slate-600'}`}>{getSlotLabel(slot.id)}</div>
                                                        </div>
                                                        <div className="flex-1">
                                                            <div className={`text-lg font-black leading-tight ${isCurrent ? 'text-blue-900' : 'text-slate-800'}`}>{classData.subject}</div>
                                                            {teacherText && (
                                                                <div className={`flex items-center mt-1 ${isCurrent ? 'text-blue-700' : 'text-slate-500'}`}>
                                                                    {userType === 'student' && classData.teacher ? (
                                                                        <TeacherAvatar teacherId={classData.teacher} sizeClass="w-6 h-6 mr-1 border" />
                                                                    ) : null}
                                                                    <span className="text-sm font-bold">{teacherText}</span>
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            const renderDashboard = () => {
                const displayName = userType === 'student' ? selectedId : TEACHERS[selectedId];
                const activeSlots = userSlots.filter(s => currentSchedule[s.id]);

                return (
                    <div className="max-w-6xl mx-auto pt-8 px-4 pb-20 fade-in w-full flex flex-col flex-1">
                        
                        {/* HEADER НА ПРОФИЛА */}
                        <div className="flex flex-col md:flex-row md:items-center justify-between mb-8 bg-white p-5 md:p-6 rounded-[2rem] shadow-sm border border-slate-100">
                            <button onClick={goHome} className="flex items-center justify-center p-3 bg-slate-100 rounded-full shadow-inner text-slate-600 hover:text-blue-600 hover:bg-blue-50 transition-all self-start md:self-auto mb-4 md:mb-0 group w-12 h-12 shrink-0">
                                <Icons.Back />
                            </button>
                            <div className="text-left md:text-right w-full md:pl-6">
                                <div className="text-sm text-slate-400 font-bold uppercase tracking-widest mb-1">Профил</div>
                                <div className="text-3xl md:text-4xl font-black text-slate-800 tracking-tight leading-tight mb-5">{displayName}</div>
                                
                                <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between md:justify-end gap-4 w-full">
                                    {/* БУТОНИ ДНЕС / СЕДМИЦА */}
                                    <div className="flex bg-slate-100 p-1.5 rounded-2xl w-full sm:w-auto shadow-inner">
                                        <button 
                                            onClick={() => setScheduleViewMode('daily')} 
                                            className={`flex-1 sm:flex-none px-6 py-2 rounded-xl font-black text-lg transition-all ${scheduleViewMode === 'daily' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}
                                        >
                                            Днес
                                        </button>
                                        <button 
                                            onClick={() => setScheduleViewMode('weekly')} 
                                            className={`flex-1 sm:flex-none px-6 py-2 rounded-xl font-black text-lg transition-all ${scheduleViewMode === 'weekly' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}
                                        >
                                            Седмица
                                        </button>
                                    </div>

                                    {/* СТАТУС ВРЕМЕ */}
                                    <div className="text-xs flex items-center space-x-2 shrink-0">
                                        {timeSyncStatus === 'synced' ? (
                                            <span className="text-emerald-700 font-bold bg-emerald-100 px-3 py-1.5 rounded-full border border-emerald-200">🕒 Сверено</span>
                                        ) : timeSyncStatus === 'syncing' ? (
                                            <span className="text-blue-500 font-bold">🕒 Сверяване...</span>
                                        ) : (
                                            <span className="text-slate-600 font-bold bg-slate-200 px-3 py-1.5 rounded-full">🕒 Локално</span>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {scheduleViewMode === 'daily' ? (
                            <>
                                {/* ДНЕВНА ПРОГРАМА */}
                                {renderStatusBox()}
                                
                                {activeSlots.length > 0 && !isWeekend && (
                                    <div className="mt-6 flex-1 max-w-4xl mx-auto w-full">
                                        <h4 className="text-2xl md:text-3xl font-black text-slate-700 mb-6 ml-2 uppercase tracking-widest opacity-80 border-b-4 border-slate-200 pb-2">
                                            График за деня <span className="text-blue-600">({todayStr})</span>
                                        </h4>
                                        <div className="space-y-4">
                                            {activeSlots.map(slot => {
                                                const classData = currentSchedule[slot.id];
                                                const isPast = currentMins > slot.end;
                                                const isCurrent = currentMins >= slot.start && currentMins <= slot.end;

                                                let teacherText = "";
                                                if (classData.teacher) {
                                                    teacherText = userType === 'student' ? `при ${formatTeacherName(TEACHERS[classData.teacher])}` : `с ${classData.isWith}`;
                                                }

                                                return (
                                                    <div key={slot.id} className={`relative overflow-hidden flex flex-col lg:flex-row lg:items-center p-5 lg:p-0 rounded-[1.5rem] transition-all shadow-sm border border-slate-100 ${isPast ? 'bg-slate-200 opacity-60 grayscale' : isCurrent ? 'bg-white shadow-xl ring-4 ring-blue-500 transform scale-[1.01] z-10' : 'bg-white hover:shadow-md'}`}>
                                                        <div className={`absolute left-0 top-0 bottom-0 w-3 ${isPast ? 'bg-slate-400' : isCurrent ? 'bg-blue-600' : 'bg-slate-300'}`}></div>
                                                        <div className="flex flex-col lg:flex-row lg:w-full lg:items-center pl-5 lg:pl-8 lg:pr-5 py-1 lg:py-4">
                                                            <div className="flex flex-col items-start lg:w-1/4 mb-3 lg:mb-0 lg:pr-4 shrink-0">
                                                                <span className={`inline-block px-3 py-1 rounded-lg text-base md:text-lg font-bold shadow-sm w-max mb-2 ${isCurrent ? 'bg-blue-600 text-white' : 'bg-slate-100 border border-slate-200 text-slate-700'}`}>
                                                                    {getSlotLabel(slot.id)}
                                                                </span>
                                                                <span className="flex items-center text-base md:text-lg font-bold text-slate-500 bg-slate-50 px-3 py-1 rounded-lg w-max border border-slate-100">
                                                                    <Icons.Clock /> {formatTimeDisplay(slot.start)} - {formatTimeDisplay(slot.end)}
                                                                </span>
                                                            </div>
                                                            <div className="lg:flex-1 lg:border-l-4 lg:border-slate-100 lg:px-6 mb-3 lg:mb-0 flex flex-col justify-center min-h-[4rem]">
                                                                <h5 className={`text-2xl md:text-3xl font-black leading-tight tracking-tight ${isCurrent ? 'text-blue-900' : 'text-slate-800'}`}>
                                                                    {classData.subject}
                                                                </h5>
                                                            </div>
                                                            <div className="lg:w-[40%] flex items-center lg:justify-end mt-2 lg:mt-0 shrink-0">
                                                                {teacherText && (
                                                                    <div className={`flex items-center text-lg md:text-2xl font-extrabold ${isCurrent ? 'text-blue-800' : 'text-slate-600'} bg-slate-50 lg:bg-transparent px-4 py-3 lg:p-0 rounded-xl w-full lg:w-auto border border-slate-100 lg:border-none`}>
                                                                        {userType === 'student' && classData.teacher ? (
                                                                            <TeacherAvatar teacherId={classData.teacher} sizeClass="w-14 h-14 lg:w-20 lg:h-20 mr-3 md:mr-4" />
                                                                        ) : (
                                                                            <Icons.User />
                                                                        )}
                                                                        <span className="text-left lg:text-right w-full leading-tight">{teacherText}</span>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}
                            </>
                        ) : (
                            /* СЕДМИЧНА ПРОГРАМА */
                            renderWeeklyView()
                        )}
                    </div>
                );
            };

            return (
                <div className="relative flex-1 flex flex-col h-full">
                    <div className="flex-1 flex flex-col w-full">
                        {view === 'home' && renderHome()}
                        {(view === 'select_student' || view === 'select_teacher') && renderSelector(view)}
                        {view === 'dashboard' && renderDashboard()}
                    </div>

                    {/* Footer - ЦСОП */}
                    <div className="mt-auto pt-10 pb-6 text-center text-slate-500 w-full bg-slate-100/50 border-t border-slate-200">
                        <div className="font-black text-lg mb-1 text-slate-600 uppercase tracking-widest">
                            Седмично разписание за II срок
                        </div>
                        <div className="font-bold text-base mb-4 opacity-80">
                            2025/2026 учебна година
                        </div>
                        <div className="font-bold text-xs tracking-widest uppercase opacity-60">
                            ЦСОП "Леда Милева" &copy; {new Date().getFullYear()} Всички права запазени.
                        </div>
                    </div>

                    {/* ПАНЕЛ ЗА ТЕСТВАНЕ */}
                    <div className="fixed bottom-4 right-4 bg-white/95 backdrop-blur-xl p-4 rounded-2xl shadow-xl border border-slate-200 z-50 text-sm">
                        <label className="flex items-center space-x-3 text-slate-800 font-bold cursor-pointer">
                            <input type="checkbox" checked={testTimeMode} onChange={e => setTestTimeMode(e.target.checked)} className="w-5 h-5 text-blue-600 rounded" />
                            <span className="text-lg">Тест панел</span>
                        </label>
                        {testTimeMode && (
                            <div className="mt-3">
                                <input 
                                    type="time" 
                                    value={mockTime} 
                                    onChange={e => setMockTime(e.target.value)} 
                                    className="border-2 border-slate-200 rounded-xl px-3 py-2 w-full text-xl font-black focus:outline-none focus:border-blue-500 bg-slate-50" 
                                />
                                <div className="text-xs text-slate-500 mt-2 font-medium leading-tight">При уикенд се симулира понеделник.</div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
